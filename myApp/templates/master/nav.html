<head>
  <!-- Other head elements -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>

<ul>
  {% if request.user.is_authenticated %}
    <li>
      <a href="{% url 'task_list' %}">Task List</a>
    </li>
    <li>
      <a class="active" href="{% url 'logoutPage' %}">Logout</a>
    </li>
  {% else %}
    <li style="float:left">
      <a class="active" href="{% url 'signupPage' %}">Sign Up</a>
    </li>
    <li style="float:left">
      <a class="active" href="{% url 'signinPage' %}">Log-in</a>
    </li>
  {% endif %}
</ul>
